<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookFace</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/user.css') }}">
</head>
<body>
<div class="app-container">
  <div class="sidebar" id="sidebar">
    <img src="{{ user_profile_image }}" alt="Avatar" class="avatar">
    <div class="username">{{ username }}</div>
    <div class="nav-container">
      <div class="nav-item" onclick="navigateTo('edit_profile')">
        <i class="fas fa-user-edit"></i>
        <span class="nav-text">Личный кабинет</span>
      </div>
      <div class="nav-item active" onclick="navigateTo('library')">
        <i class="fas fa-book"></i>
        <span class="nav-text">Моя библиотека</span>
      </div>
      <div class="nav-item" onclick="navigateTo('favorites')">
        <i class="fas fa-star"></i>
        <span class="nav-text">Избранное</span>
      </div>
      <div class="nav-item" onclick="navigateTo('marathons')">
        <i class="fas fa-flag"></i>
        <span class="nav-text">Марафоны</span>
      </div>
      <div class="nav-item" onclick="navigateTo('tinder')">
        <i class="fas fa-heart"></i>
        <span class="nav-text">Книжный тиндер</span>
      </div>
      <div class="nav-item" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
        <span class="nav-text">Выйти</span>
      </div>
    </div>
    <div class="toggle-btn" onclick="toggleSidebar()">
      <i class="fas fa-chevron-left"></i>
    </div>
  </div>

  <div class="content-wrapper">
    <div class="header">
      <div class="site-title">BookFace</div>
    </div>
    <div class="content">
      <div id="edit_profile-content" class="tab-content">
        <form id="editProfileForm" onsubmit="return updateProfile(event)">
          <div class="form-group">
            <label for="editProfileImage">Фотография:</label>
            <input type="file" id="editProfileImage" name="profile_image" onchange="previewProfileImage(event)">
          </div>
          <div class="form-group">
            <label for="editUsername">Имя пользователя:</label>
            <input type="text" id="editUsername" name="username">
          </div>
          <div class="form-group">
            <label for="editEmail">Email:</label>
            <input type="email" id="editEmail" name="email">
          </div>
          <div class="form-group">
            <label for="currentPassword">Текущий пароль:</label>
            <input type="password" id="currentPassword" name="current_password">
          </div>
          <div class="form-group">
            <label for="editPassword">Новый пароль:</label>
            <input type="password" id="editPassword" name="password">
          </div>
          <div class="form-actions">
            <button type="submit">Сохранить</button>
            <button type="button" onclick="cancelEdit()">Отменить</button>
          </div>
        </form>
      </div>

      <div id="library-content" class="tab-content active">
        <div class="search-container">
          <input type="text" id="bookSearch" placeholder="Поиск по автору или названию...">
          <button onclick="searchBooks(event)">Поиск</button>
        </div>
        <div class="search-results" id="searchResults"></div>
        <div class="tabs">
          <button class="tab-button active" onclick="openTab('planned')">Планирую</button>
          <button class="tab-button" onclick="openTab('reading')">Читаю</button>
          <button class="tab-button" onclick="openTab('read')">Прочитано</button>
        </div>
        <div id="planned" class="tab-content active">
          <h3>Запланированные книги</h3>
          <div class="book-list" id="plannedBooks"></div>
        </div>
        <div id="reading" class="tab-content">
          <h3>Читаю сейчас</h3>
          <div class="book-list" id="readingBooks"></div>
        </div>
        <div id="read" class="tab-content">
          <h3>Прочитанные книги</h3>
          <div class="book-list" id="readBooks"></div>
        </div>
      </div>

      <div id="favorites-content" class="tab-content">
        <div class="search-results" id="favoritesBooks"></div>
      </div>

      <div id="marathons-content" class="tab-content">
        <div class="marathons-header">
          <div class="tabs">
            <button class="tab-button active" onclick="openMarathonTab('all')">Все</button>
            <button class="tab-button" onclick="openMarathonTab('my')">Мои</button>
            <button class="tab-button" onclick="openMarathonTab('active')">Активные</button>
            <button class="tab-button" onclick="openMarathonTab('completed')">Завершенные</button>
            <button class="add-marathon-btn" onclick="showAddMarathonForm()">Добавить марафон</button>
          </div>
        </div>


        <div id="addMarathonForm" style="display: none; margin-top: 20px;">
          <h3>Добавить новый марафон</h3>
          <form id="marathonForm" onsubmit="return addMarathon(event)">
            <div class="form-group">
              <label>Название марафона</label>
              <input type="text" id="marathonName" required>
            </div>
            <div class="form-group">
              <label>Количество книг</label>
              <input type="number" id="marathonBookCount" min="1" value="1" required>
            </div>
            <div class="form-group">
              <label>Срок</label>
              <div class="duration-selector">
                <input type="number" id="marathonDurationValue" min="1" value="30" required>
                <select id="marathonDurationUnit">
                  <option value="days">дней</option>
                  <option value="months">месяцев</option>
                  <option value="years">лет</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Описание</label>
              <textarea id="marathonDescription" rows="4"></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="submit-btn">Добавить</button>
              <button type="button" class="cancel-btn" onclick="hideAddMarathonForm()">Отмена</button>
            </div>
          </form>
        </div>


        <div id="allMarathons" class="tab-content active">
          <div class="marathon-list" id="allMarathonsList"></div>
        </div>
        <div id="myMarathons" class="tab-content">
          <div class="marathon-list" id="myMarathonsList"></div>
        </div>
        <div id="activeMarathons" class="tab-content">
          <div class="marathon-list" id="activeMarathonsList"></div>
        </div>
        <div id="completedMarathons" class="tab-content">
          <div class="marathon-list" id="completedMarathonsList"></div>
        </div>
      </div>

      <div id="editMarathonModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000;">
        <div class="modal-content" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 500px; max-width: 90%;">
          <h3>Редактировать марафон</h3>
          <form id="editMarathonForm" onsubmit="return updateMarathon(event)">
            <input type="hidden" id="editMarathonId">
            <div class="form-group">
              <label>Название марафона</label>
              <input type="text" id="editMarathonName" required>
            </div>
            <div class="form-group">
              <label>Количество книг</label>
              <input type="number" id="editMarathonBookCount" min="1" required>
            </div>
            <div class="form-group">
              <label>Срок</label>
              <div class="duration-selector">
                <input type="number" id="editMarathonDurationValue" min="1" value="30" required>
                <select id="editMarathonDurationUnit">
                  <option value="days">дней</option>
                  <option value="months">месяцев</option>
                  <option value="years">лет</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Описание</label>
              <textarea id="editMarathonDescription"></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="submit-btn">Сохранить</button>
              <button type="button" onclick="hideEditMarathonModal()" class="cancel-btn">Отмена</button>
            </div>
          </form>
        </div>
      </div>

      <div id="progressModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000;">
        <div class="modal-content" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 500px; max-width: 90%;">
          <h3>Отслеживание прогресса</h3>
          <form id="progressForm">
            <input type="hidden" id="progressMarathonId">

            <div class="form-group" style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 5px; font-weight: bold;">Прогресс:</label>
              <div style="display: flex; align-items: center; gap: 10px;">
                <input type="number" id="progressCount" min="0" max="0" style="width: 80px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <span>/</span>
                <span id="marathonTotalBooks" style="font-weight: bold;"></span>
              </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 5px; font-weight: bold;">Заметки:</label>
              <textarea id="progressNotes" rows="5" placeholder="Ваши заметки о прогрессе..." style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;"></textarea>
            </div>

            <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 10px;">
              <button type="button" onclick="hideProgressModal()" style="background-color: #F08080; color: black; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer;">Отмена</button>
              <button type="button" onclick="saveProgress()" style="background-color: #ffebcd; color: black; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer;">Сохранить</button>
            </div>
          </form>
        </div>
      </div>

      <div id="tinder-content" class="tab-content">
        <div class="tinder-container">
          <div class="tinder-card" id="currentBook"></div>
          <div class="tinder-actions">
            <button class="tinder-like" onclick="likeBook()">
              <i class="fas fa-heart"></i>
            </button>
            <button class="tinder-dislike" onclick="dislikeBook()">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="status-message" id="statusMessage"></div>
<script src="{{ url_for('static', filename='js/user.js') }}"></script>
</body>
</html>
